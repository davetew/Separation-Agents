type: equilibrium_reactor
description: >
  Gibbs energy minimization reactor using Reaktoro. Computes equilibrium
  phase assemblage and species distribution at specified T and P.
  Supports mineral precipitation, gas evolution, and aqueous speciation.
defaults:
  T_C: 200.0
  p_bar: 100.0
  residence_time_s: 7200.0
  tank_volume_m3: 10.0
  database: supcrtbl
bounds:
  T_C: [25.0, 500.0]
  p_bar: [1.0, 500.0]
  residence_time_s: [1800.0, 86400.0]
  tank_volume_m3: [1.0, 100.0]
required_params: []
optional_params:
  - residence_time_s
  - T_C
  - T_K
  - p_bar
  - P_Pa
  - tank_volume_m3
  - agitation_power_kW
  - reagent_dosage_gpl
  - reagent_name
  - equilibrium_phases
  - gas_phases
  - aqueous_elements
  - database
