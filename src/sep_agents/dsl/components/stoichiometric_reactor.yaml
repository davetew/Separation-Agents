type: stoichiometric_reactor
description: >
  Fixed-conversion reactor using user-defined stoichiometric reactions.
  Conversion is specified, not computed from thermodynamics.
  Use equilibrium_reactor instead when thermodynamic conversion matters.
defaults:
  T_C: 200.0
  p_bar: 50.0
  residence_time_s: 7200.0
  tank_volume_m3: 10.0
bounds:
  T_C: [25.0, 500.0]
  p_bar: [1.0, 300.0]
  residence_time_s: [1800.0, 86400.0]
required_params:
  - reactions       # list of {reactants, products, conversion} dicts
optional_params:
  - residence_time_s
  - T_C
  - T_K
  - p_bar
  - P_Pa
  - tank_volume_m3
  - agitation_power_kW
